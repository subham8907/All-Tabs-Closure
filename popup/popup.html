<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tabs Closure</title>
    <style>
        :root {
            --gradient-start: #4F46E5;
            --gradient-end: #1D4ED8;
            --background-start: #F3F4F6;
            --background-end: #E5E7EB;
            --text-color: #1F2937;
            --text-secondary: #606060;
            --button-text: #ffffff;
            --o:#4F46E5;
                --f:#1D4ED8;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --gradient-start: #6366F1;
                --gradient-end: #818CF8;
                --background-start: #111827;
                --background-end: #1F2937;
                --text-color: #F9FAFB;
                --text-secondary: #b0b0b0;
                --o:#4F46E5;
                --f:#1D4ED8;
            }
        }

        body {
            width: 100%;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--background-start) 0%, var(--background-end) 100%);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h2 {
            margin-top: 0;
            font-weight: 600;
            font-size: 24px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }
        button {
            width: 200px;
            padding: 12px;
            background: linear-gradient(90deg, var(--o), var(--f));
            color: var(--button-text);
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(79, 70, 229, 0.3);
        }
        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
        }
        .icon {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            margin: 0 auto 2rem;
            display: block;
        }

        .icon-light {
            display: block;
        }

        .icon-dark {
            display: none;
        }

        @media (prefers-color-scheme: dark) {
            .icon-light {
                display: none;
            }

            .icon-dark {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="../icons/icontrans128_light.png" alt="Close Tabs Icon (Light Mode)" class="icon icon-light">
        <img src="../icons/icontrans128_dark.png" alt="Close Tabs Icon (Dark Mode)" class="icon icon-dark">
        
        <h2>All Tabs Closure</h2>
        <p><strong>Ready for a fresh start? Click below to close all your open tabs instantly.</strong></p>
        <p><strong>Please be cautious! Clicking below will close all your active opened tabs instantly.</strong></p>
        <button id="closeAllTabs">Close All Tabs</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
