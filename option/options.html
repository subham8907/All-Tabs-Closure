<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tabs Closure Options</title>
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --background-color: #F3F4F6;
            --text-color: #1F2937;
            --container-bg: #FFFFFF;
            --border-color: #E5E7EB;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --warning-bg: #FEF2F2;
            --warning-text: #DC2626;
            --h2-color: #4F46E5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary-color: #4F46E5;
                --primary-hover: #4338CA;
                --background-color: #111827;
                --text-color: #F9FAFB;
                --container-bg: #1F2937;
                --border-color: #374151;
                --shadow-color: rgba(0, 0, 0, 0.3);
                --warning-bg: #FEE2E2;
                --warning-text: #EF4444;
                --h2-color: #ffffff;
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.5;
            color: var(--text-color);
            background-color: var(--background-color);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: var(--container-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px var(--shadow-color), 0 4px 6px -2px var(--shadow-color);
            max-width: 550px;
            width: 100%;
            border: 1px solid var(--border-color);
        }

        h2 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--h2-color);
            text-align: center;
        }

        .warning {
            font-weight: 600;
            color: var(--warning-text);
            margin-bottom: 1.5rem;
            text-align: center;
            padding: 1rem;
            background-color: var(--warning-bg);
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .radio-option {
            display: flex;
            align-items: center;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .radio-option:hover {
            background-color: var(--background-color);
            transform: translateY(-2px);
        }

        .radio-option input[type="radio"] {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            margin-right: 1rem;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }

        .radio-option input[type="radio"]:checked::after {
            content: '';
            width: 0.75rem;
            height: 0.75rem;
            background-color: var(--primary-color);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        button {
            padding: 0.75rem 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px var(--shadow-color);
        }

        #status {
            margin-top: 1.5rem;
            text-align: center;
            font-weight: 600;
            color: var(--primary-color);
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="../icons/icon128.png" alt="Close Tabs Icon" class="icon">

        <h2>All Tabs Closure Settings</h2>
        <p class="warning">Caution: These actions will affect extension behavior.</p>
        <form id="optionsForm">
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="actionType" value="newtab" checked>
                    Open new tab after closing except pinned
                </label>
                <label class="radio-option">
                    <input type="radio" name="actionType" value="close">
                    Close all tabs (including browser)
                </label>
                <label class="radio-option">
                    <input type="radio" name="actionType" value="closeAllAndNewTab">
                    Close all tabs (including pinned) without closing browser
                </label>
                <label class="radio-option">
                    <input type="radio" name="actionType" value="closeAllExceptCurrentandpinned">
                    Close all tabs except current and pinned tabs
                </label>
                <label class="radio-option">
                    <input type="radio" name="actionType" value="closeAllExceptCurrent">
                    Close all tabs except current tab
                </label>
                <label class="radio-option">
                    <input type="radio" name="actionType" value="closeAllOtherWindows">
                    Close all tabs in other windows
                </label>
                <label class="radio-option">
                    <input type="radio" name="actionType" value="exceptPinnedAndGrouped">
                    Close all tabs except current, pinned, group tabs
                </label>
                <label class="radio-option">
                    <input type="radio" name="actionType" value="closeAndClearHistory">
                    Close all tabs and clear search History
                </label>
            </div>
            
            <div class="button-container">
                <button type="button" id="saveButton">Save</button>
                <button type="button" id="saveExitButton">Save and Exit</button>
                <button type="button" id="executeButton">Execute and Save</button>
                <button type="button" id="saveExecuteExit">Save, Execute, Exit</button>
            </div>
        </form>
        <p id="status"></p>
    </div>
    <script src="options.js"></script>
</body>
</html>
